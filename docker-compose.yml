services:
  # Instance Generator (Main app)
  instance-generator:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: glueos-instance-generator
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/instance-generator/node_modules
      - /app/apps/ui-sandbox/node_modules
      - /app/packages/ui/node_modules
      - /app/packages/eslint-config/node_modules
      - /app/packages/typescript-config/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: pnpm run dev --filter=instance-generator
    networks:
      - glueos-network

  # Storybook
  storybook:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: glueos-storybook
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/instance-generator/node_modules
      - /app/apps/ui-sandbox/node_modules
      - /app/packages/ui/node_modules
      - /app/packages/eslint-config/node_modules
      - /app/packages/typescript-config/node_modules
    ports:
      - "6006:6006"
    environment:
      - NODE_ENV=development
    command: pnpm run dev --filter=@repo/ui
    networks:
      - glueos-network

  # UI Sandbox (for testing)
  ui-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: glueos-ui-sandbox
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/instance-generator/node_modules
      - /app/apps/ui-sandbox/node_modules
      - /app/packages/ui/node_modules
      - /app/packages/eslint-config/node_modules
      - /app/packages/typescript-config/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    command: pnpm run dev --filter=ui-sandbox
    networks:
      - glueos-network

networks:
  glueos-network:
    driver: bridge

volumes:
  node_modules:
